name: Aphrodite Chibi Continuous Integration

on:
  pull_request:
    branches:
      - main

jobs:
  frontend-test:
    name: Frontend unit testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Playwright Component Tests
        run: pnpm playwright
